# $FreeBSD$

freebsd_instance:
  image: freebsd-13-2-release-amd64

env:
  CIRRUS_CLONE_DEPTH: 1
  CIRRUS_CLONE_SUBMODULES: true

task:
  install_script:
  - pkg-install -y
    cmake ninja binutils pkgconf curl
    ffmpeg qt6-base qt6-svg jansson libsysinfo pulseaudio alsa-lib pipewire
    libpci srt librist nlohmann-json qr-code-generator vlc
    websocketpp asio swig luajit jackit sndio fdk-aac e2fsprogs-libuuid
    v4l_compat
  script:
  - cmake
    -S $(pwd)
    -B build
    -G Ninja
    -DENABLE_JACK:BOOL=ON
    -DENABLE_SNDIO:BOOL=ON
    -DENABLE_LIBFDK:BOOL=ON
    -DENABLE_WEBRTC:BOOL=OFF
  - cmake
    --build build
    --config RelWithDebInfo
