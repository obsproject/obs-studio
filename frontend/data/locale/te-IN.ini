PluginsFailedToLoad.Text="ఈ క్రింది OBS ప్లగిన్లు లోడ్ అవ్వడానికి ఫెయిల్ అయ్యాయి: \n\n%1\n దయచేసి ప్లగిన్లను అప్డేట్ లేదా తీసివేయండి "
AlreadyRunning.Title="OBS ముందుగానే నడుస్తోంది "
AlreadyRunning.Text="OBS ఇప్పటికే నడుస్తోంది! మీరు ఉద్దేశపూర్వకంగా ఇలా చేసి ఉండకపోతే, దయచేసి కొత్త ఇన్‌స్టాన్స్‌ను నడపడానికి ప్రయత్నించే ముందు ఇప్పటికే ఉన్న OBS ఇన్‌స్టాన్స్‌లను మూసివేయండి. మీరు OBSని సిస్టమ్ ట్రేకి మినిమైజ్ అయ్యేలా సెట్ చేసి ఉంటే, అది అక్కడ ఇంకా నడుస్తోందో లేదో దయచేసి తనిఖీ చేయండి."
AlreadyRunning.LaunchAnyway="ఏమైనప్పటికీ ప్రారంభించండి"
CrashHandling.Dialog.Title="OBS Studio క్రాష్ అయ్యింది "
CrashHandling.Labels.Text="OBS Studio సరిగ్గా షట్డౌన్ అవ్వలేదు.\n\n సేఫ్ మోడ్ లో తెరవలా (థర్డ్-పార్టీ ప్లగిన్‌లు, స్క్రిప్టింగ్ మరియు వెబ్‌సాకెట్‌ను డిసేబుల్ చేసి)?"
CrashHandling.Labels.PrivacyNotice="మీరు అత్యంత ఇటీవలి క్రాష్ రిపోర్ట్‌ను OBSProjectకి ఆటోమేటిక్‌గా అప్‌లోడ్ చేయడానికి కూడా ఎంచుకోవచ్చు.<br /><br />దయచేసి ఏవైనా ఫైల్‌లను అప్‌లోడ్ చేసే ముందు <a href='https://obsproject.com/privacy-policy'>గోప్యతా విధానాన్ని</a> చదవండి మరియు ఫైల్ అప్‌లోడ్‌లకు సంబంధించిన భాగాలపై ప్రత్యేక శ్రద్ధ వహించండి."
CrashHandling.Checkbox.SendReport="నేను గోప్యతా విధానాన్ని చదివాను మరియు అప్‌లోడ్‌కు అంగీకరిస్తున్నాను."
CrashHandling.Buttons.LaunchSafe="సేఫ్ మోడ్ లో తెరుచు "
CrashHandling.Buttons.LaunchNormal="నార్మల్ మోడ్ లో తెరుచు "
CrashHandling.Errors.UploadJSONError="ఇటీవలి క్రాష్ లాగ్‌ను అప్‌లోడ్ చేసే ప్రయత్నంలో లోపం సంభవించింది. దయచేసి తర్వాత మళ్ళీ ప్రయత్నించండి."
CrashHandling.Errors.Title="క్రాష్ లాగ్(log) అప్‌లోడ్ లో ఎర్రర్ "
SafeMode.Restart="మీరు OBSని సేఫ్ మోడ్‌లో (థర్డ్-పార్టీ ప్లగిన్‌లు, స్క్రిప్టింగ్ మరియు వెబ్‌సాకెట్‌లు నిలిపివేసి) పునఃప్రారంభించాలనుకుంటున్నారా?"
SafeMode.RestartNormal="మీరు OBSని సాధారణ మోడ్‌లో పునఃప్రారంభించాలనుకుంటున్నారా?"
ChromeOS.Title="అన్సాపోర్టెడ్ ప్లాట్ఫారం "
ChromeOS.Text="OBS ఒక ChromeOS కంటైనర్‌లో నడుస్తున్నట్లు కనిపిస్తోంది. ఈ ప్లాట్‌ఫారమ్‌కు సపోర్టు లేదు."
Wine.Title="Wine గుర్తించబడింది "
Wine.Text="Wineలో OBSను రన్ చేయడానికి సపోర్ట్ లేదు , మరియు క్యాప్చర్ లేదా డివైస్ సోర్సెస్ వంటి అనేక ఫీచర్లు పనిచేయవు లేదా పరిమిత సామర్థ్యంతో మాత్రమే పనిచేస్తాయి. <br><br>దానికి బదులుగా, OBS యొక్క నేటివ్ వెర్షన్‌ను రన్ చేయమని సిఫార్సు చేయబడింది, ఉదాహరణకు <a href='https://flathub.org/apps/details/com.obsproject.Studio'>మా Flatpak version </a> లేదా మీ ఆపరేటింగ్ సిస్టమ్ ప్యాకేజీలు."
DockCloseWarning.Title="డాక్ అయ్యే విండో ను మూసివేస్తుంది"
